name: Build and update POSIX iwasm

on:
  workflow_dispatch:

jobs:
  build-posix-iwasm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - run: zig build -Dbuild_iwasm_bin

      - uses: actions/upload-artifact@v6
        with:
          name: posix-iwasm
          path: |
            zig-out/bin/iwasm